<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Box</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --gold:#c9a227; --gold-light:#f0d060;
  --cyan:#4fc3e8; --white:#f5f0ff;
}
body {
  min-height:100vh;
  background:#0a0318;
  font-family:'Raleway',sans-serif;
  overflow-x:hidden;
}
.bg-layer {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 70% 55% at 50% 0%,#3a0d6e44 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 15% 85%,#1e0a4a55 0%,transparent 60%),
    radial-gradient(ellipse 45% 35% at 85% 85%,#4a0f7833 0%,transparent 60%),
    linear-gradient(160deg,#090218 0%,#130726 50%,#090218 100%);
}
.stars {
  position:fixed; inset:0; z-index:0;
  background-image:
    radial-gradient(1px 1px at 8% 12%,rgba(255,255,255,.75) 0%,transparent 100%),
    radial-gradient(1px 1px at 22% 38%,rgba(255,255,255,.55) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 38% 8%,rgba(200,180,255,.85) 0%,transparent 100%),
    radial-gradient(1px 1px at 52% 65%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 68% 22%,rgba(255,255,255,.45) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 83% 48%,rgba(180,140,255,.75) 0%,transparent 100%),
    radial-gradient(1px 1px at 12% 72%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 92% 78%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 45% 90%,rgba(200,180,255,.55) 0%,transparent 100%),
    radial-gradient(1px 1px at 76% 10%,rgba(255,255,255,.65) 0%,transparent 100%),
    radial-gradient(1px 1px at 3% 55%,rgba(180,140,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 60% 30%,rgba(255,255,255,.4) 0%,transparent 100%);
}
.orb { position:fixed; border-radius:50%; filter:blur(90px); pointer-events:none; z-index:0; animation:orbPulse ease-in-out infinite; }
.orb-1{width:420px;height:420px;background:rgba(110,40,230,.18);top:-120px;left:-120px;animation-duration:9s;}
.orb-2{width:360px;height:360px;background:rgba(79,195,232,.07);bottom:-90px;right:-90px;animation-duration:11s;animation-delay:-4s;}
.orb-3{width:280px;height:280px;background:rgba(150,60,255,.12);top:38%;left:62%;animation-duration:13s;animation-delay:-7s;}
@keyframes orbPulse{0%,100%{transform:scale(1);opacity:.6;}50%{transform:scale(1.18);opacity:1;}}
.particle{position:fixed;border-radius:50%;pointer-events:none;z-index:0;animation:floatUp linear infinite;}
@keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0;}10%{opacity:1;}90%{opacity:.4;}100%{transform:translateY(-10vh) scale(1.3);opacity:0;}}

.container {
  position:relative; z-index:10;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:40px 20px 60px;
}

/* LOGO */
.logo-area {
  margin-bottom:20px;
  display:flex; align-items:center; justify-content:center;
}
.logo-area img {
  max: width 280px;; max-height:280px;
  object-fit:contain;
  filter:drop-shadow(0 0 16px rgba(201,162,39,.45));
}

/* TITLE */
.title-wrap{text-align:center;margin-bottom:24px;}
.title-sub{font-family:'Cinzel',serif;font-size:11px;letter-spacing:6px;color:var(--gold);margin-bottom:8px;opacity:.82;}
.title-main{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(26px,7vw,44px);font-weight:900;
  background:linear-gradient(135deg,#f0d060 0%,#c9a227 40%,#fff8d0 60%,#c9a227 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px rgba(201,162,39,.5));
  letter-spacing:3px;line-height:1.1;
}
.title-deco{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px;}
.title-deco span{height:1px;width:55px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.title-deco .gem{color:var(--cyan);font-size:10px;animation:gemPulse 2s ease-in-out infinite;}
@keyframes gemPulse{0%,100%{text-shadow:0 0 6px var(--cyan);}50%{text-shadow:0 0 18px var(--cyan),0 0 32px rgba(79,195,232,.5);}}

/* BOX AREA */
.box-wrap {
  position:relative;
  width:300px; height:300px;
  margin-bottom:28px;
  display:flex; align-items:center; justify-content:center;
}
.box-glow {
  position:absolute; inset:0; border-radius:50%;
  background:radial-gradient(ellipse 60% 50% at 50% 60%,rgba(120,40,220,.45) 0%,transparent 70%);
  animation:glowPulse 3s ease-in-out infinite;
  pointer-events:none; z-index:0;
}
@keyframes glowPulse{0%,100%{opacity:.6;transform:scale(1);}50%{opacity:1;transform:scale(1.12);}}

#boxImg {
  width:240px; height:240px;
  object-fit:contain;
  position:relative; z-index:2;
  filter:drop-shadow(0 8px 24px rgba(100,30,200,.6)) drop-shadow(0 0 12px rgba(201,162,39,.3));
  transform-origin:center center;
  animation:idleFloat 3.5s ease-in-out infinite;
}
@keyframes idleFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* SHAKE — pakai nama unik agar tidak bentrok */
@keyframes doShake {
  0%  { transform:translateY(0) rotate(0deg); }
  8%  { transform:translateY(-6px) rotate(-6deg); }
  16% { transform:translateY(0) rotate(6deg); }
  24% { transform:translateY(-8px) rotate(-5deg); }
  32% { transform:translateY(0) rotate(5deg); }
  40% { transform:translateY(-10px) rotate(-7deg); }
  48% { transform:translateY(0) rotate(7deg); }
  56% { transform:translateY(-8px) rotate(-4deg); }
  64% { transform:translateY(0) rotate(4deg); }
  72% { transform:translateY(-5px) rotate(-3deg); }
  80% { transform:translateY(0) rotate(3deg); }
  90% { transform:translateY(-3px) rotate(-1deg); }
  100%{ transform:translateY(0) rotate(0deg); }
}
#boxImg.shaking {
  animation: doShake 0.85s cubic-bezier(.36,.07,.19,.97) both !important;
}

/* CAHAYA LEDAKAN — fullscreen, z-index tinggi */
#lightBurst {
  position:fixed; inset:0; z-index:600;
  pointer-events:none; display:none;
  background:radial-gradient(ellipse at 50% 50%,
    rgba(255,255,255,1) 0%,
    rgba(255,245,130,1) 12%,
    rgba(255,210,60,.98) 25%,
    rgba(220,130,255,.92) 45%,
    rgba(110,40,220,.65) 65%,
    rgba(30,5,80,.3) 82%,
    transparent 100%
  );
}
#lightBurst.explode {
  display:block;
  animation: lightExplode 1.0s ease-out forwards;
}
@keyframes lightExplode {
  0%   { opacity:0;  transform:scale(0); }
  10%  { opacity:1;  transform:scale(0.4); }
  30%  { opacity:1;  transform:scale(0.85); }
  55%  { opacity:.97;transform:scale(1.1); }
  80%  { opacity:.6; transform:scale(1.3); }
  100% { opacity:0;  transform:scale(1.6); }
}

/* SINAR — fullscreen */
#raysBurst {
  position:fixed; inset:0; z-index:599;
  pointer-events:none; display:none;
  background:conic-gradient(
    from 0deg at 50% 50%,
    transparent 0deg,   rgba(255,240,80,.9)   7deg,  transparent 14deg,
    transparent 28deg,  rgba(255,255,180,.75) 35deg, transparent 42deg,
    transparent 56deg,  rgba(255,220,80,.85)  63deg, transparent 70deg,
    transparent 84deg,  rgba(255,240,80,.8)   91deg, transparent 98deg,
    transparent 112deg, rgba(255,255,180,.7)  119deg,transparent 126deg,
    transparent 140deg, rgba(255,220,80,.8)   147deg,transparent 154deg,
    transparent 168deg, rgba(255,240,80,.85)  175deg,transparent 182deg,
    transparent 196deg, rgba(255,255,180,.75) 203deg,transparent 210deg,
    transparent 224deg, rgba(255,220,80,.8)   231deg,transparent 238deg,
    transparent 252deg, rgba(255,240,80,.8)   259deg,transparent 266deg,
    transparent 280deg, rgba(255,255,180,.7)  287deg,transparent 294deg,
    transparent 308deg, rgba(255,220,80,.85)  315deg,transparent 322deg,
    transparent 336deg, rgba(255,240,80,.8)   343deg,transparent 350deg,
    transparent 360deg
  );
}
#raysBurst.shoot {
  display:block;
  animation: raysShoot 0.95s ease-out forwards;
}
@keyframes raysShoot {
  0%   { opacity:0;  transform:scale(0.1) rotate(0deg); }
  15%  { opacity:.9; transform:scale(0.5) rotate(10deg); }
  40%  { opacity:1;  transform:scale(0.9) rotate(28deg); }
  70%  { opacity:.7; transform:scale(1.2) rotate(50deg); }
  100% { opacity:0;  transform:scale(1.8) rotate(75deg); }
}

/* FORM */
.form-wrap{width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.input-label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;color:rgba(201,162,39,.78);align-self:flex-start;margin-left:2px;}
.input-wrap{width:100%;position:relative;}
.input-wrap::before{content:'✦';position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:11px;z-index:2;pointer-events:none;}
#userId{
  width:100%;padding:15px 18px 15px 38px;
  background:rgba(30,8,65,.78);
  border:1.5px solid rgba(201,162,39,.32);
  border-radius:12px;color:var(--white);
  font-family:'Raleway',sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;
  outline:none;transition:all .3s;
}
#userId::placeholder{color:rgba(200,170,255,.3);letter-spacing:1px;font-weight:400;}
#userId:focus{border-color:var(--gold);background:rgba(45,12,90,.88);box-shadow:0 0 0 3px rgba(201,162,39,.12),0 0 22px rgba(150,70,255,.25);}
#errorMsg{color:#ff6b9d;font-size:12px;font-family:'Cinzel',serif;letter-spacing:1px;text-align:center;min-height:18px;opacity:0;transition:opacity .3s;}
#errorMsg.show{opacity:1;}

.btn-open{
  width:100%;padding:17px 24px;
  background:linear-gradient(135deg,#8a6d0f 0%,#c9a227 30%,#f0d060 50%,#c9a227 70%,#8a6d0f 100%);
  border:none;border-radius:12px;
  font-family:'Cinzel Decorative',serif;font-size:14px;font-weight:700;
  color:#120820;letter-spacing:2px;cursor:pointer;
  position:relative;overflow:hidden;transition:all .3s;
  box-shadow:0 4px 22px rgba(201,162,39,.35),0 0 40px rgba(201,162,39,.1);
}
.btn-open::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.38),transparent);transform:translateX(-100%);transition:transform .6s ease;}
.btn-open:hover::before{transform:translateX(100%);}
.btn-open:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,162,39,.55);}
.btn-open:active{transform:scale(.98);}
.btn-open:disabled{background:linear-gradient(135deg,#252530,#353545);color:rgba(255,255,255,.25);cursor:not-allowed;box-shadow:none;}
.btn-open:disabled::before{display:none;}
.already-msg{font-family:'Cinzel',serif;font-size:12px;color:rgba(200,170,255,.52);text-align:center;letter-spacing:1px;display:none;}

/* POPUP */
.overlay{
  position:fixed;inset:0;z-index:999;
  background:rgba(6,1,18,.9);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .4s;
}
.overlay.active{opacity:1;pointer-events:all;}
.popup{
  width:90%;max-width:420px;
  background:linear-gradient(145deg,#280e50 0%,#140626 100%);
  border:1.5px solid var(--gold);border-radius:22px;
  padding:40px 32px 36px;text-align:center;
  position:relative;overflow:hidden;
  box-shadow:0 0 55px rgba(150,60,255,.38),0 0 110px rgba(201,162,39,.14),inset 0 0 55px rgba(0,0,0,.25);
  transform:scale(.7) translateY(40px);
  transition:transform .5s cubic-bezier(.34,1.56,.64,1);
}
.overlay.active .popup{transform:scale(1) translateY(0);}
.popup-sparks{position:absolute;inset:0;border-radius:22px;overflow:hidden;pointer-events:none;}
.spark{position:absolute;width:3px;height:3px;border-radius:50%;animation:sparkFloat 3s ease-in-out infinite;}
@keyframes sparkFloat{0%,100%{transform:translateY(0) scale(1);opacity:.6;}50%{transform:translateY(-12px) scale(1.5);opacity:1;}}
.popup-icon{font-size:52px;margin-bottom:10px;animation:iconBounce .8s cubic-bezier(.34,1.56,.64,1) .3s both;}
@keyframes iconBounce{from{transform:scale(0) rotate(-20deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.popup-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(17px,5vw,24px);
  background:linear-gradient(135deg,#f0d060,#c9a227,#fff8d0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:6px;
}
.popup-sub{font-family:'Raleway',sans-serif;font-size:14px;color:rgba(200,170,255,.75);letter-spacing:1px;margin-bottom:18px;}
.popup-divider{width:75%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 16px;}
.popup-prize-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;color:rgba(201,162,39,.65);text-transform:uppercase;margin-bottom:6px;}
.popup-amount{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(28px,8vw,46px);font-weight:900;
  background:linear-gradient(135deg,#fff8d0 0%,#f0d060 40%,#c9a227 70%,#fff8d0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 14px rgba(201,162,39,.75));
  margin-bottom:26px;line-height:1.1;
}
.btn-claim{
  display:block;width:100%;padding:17px;
  background:linear-gradient(135deg,#8a6d0f 0%,#c9a227 30%,#f0d060 50%,#c9a227 70%,#8a6d0f 100%);
  border:none;border-radius:12px;
  font-family:'Cinzel Decorative',serif;font-size:14px;font-weight:700;
  color:#120820;letter-spacing:2px;cursor:pointer;
  position:relative;overflow:hidden;transition:all .3s;
  box-shadow:0 4px 22px rgba(201,162,39,.45);
  text-decoration:none; box-sizing:border-box;
}
.btn-claim::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.38),transparent);transform:translateX(-100%);transition:transform .6s;}
.btn-claim:hover::before{transform:translateX(100%);}
.btn-claim:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,162,39,.65);}
.btn-claim:active{transform:scale(.98);}

/* CONFETTI */
.conf{position:fixed;pointer-events:none;z-index:1000;animation:confFall linear forwards;}
@keyframes confFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="stars"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- efek cahaya fullscreen di luar container agar tidak terpotong -->
<div id="raysBurst"></div>
<div id="lightBurst"></div>

<div class="container">

  <!-- LOGO: taruh Logo.png di folder yang sama dengan file HTML ini -->
  <div class="logo-area">
    <img src="Logo.png" alt="Logo" onerror="this.style.display='none'">
  </div>

  <!-- TITLE -->
  <div class="title-wrap">
    <p class="title-sub">✦ Exclusive ✦</p>
    <h1 class="title-main">Mystery Box</h1>
    <div class="title-deco"><span></span><span class="gem">◆</span><span></span></div>
  </div>

  <!-- BOX IMAGE: ganti src="box.png" dengan nama file kotak kamu -->
  <div class="box-wrap" id="boxWrap">
    <div class="box-glow"></div>
    <img id="boxImg" src="box.png" alt="Mystery Box" draggable="false">
  </div>

  <!-- FORM -->
  <div class="form-wrap">
    <span class="input-label">Masukkan User ID</span>
    <div class="input-wrap">
      <input type="text" id="userId" placeholder="Contoh: USER123456" maxlength="30" autocomplete="off" spellcheck="false">
    </div>
    <div id="errorMsg"></div>
    <button class="btn-open" id="btnOpen" onclick="handleOpen()">✦ &nbsp;Buka Mystery Box&nbsp; ✦</button>
    <p class="already-msg" id="alreadyMsg">📦 Kamu sudah membuka Mystery Box hari ini</p>
  </div>

</div>

<!-- POPUP -->
<div class="overlay" id="overlay">
  <div class="popup">
    <div class="popup-sparks" id="popupSparks"></div>
    <div class="popup-icon">🎉</div>
    <h2 class="popup-title">SELAMAT!</h2>
    <p class="popup-sub">Anda mendapatkan hadiah berupa</p>
    <div class="popup-divider"></div>
    <p class="popup-prize-label">Total Hadiah</p>
    <div class="popup-amount" id="prizeAmount">Rp 0</div>

    <!-- ════════════════════════════════
         GANTI href="#" DENGAN LINK KAMU
         Contoh: href="https://lawaswow.com"
         ════════════════════════════════ -->
    <a class="btn-claim" href="https://lawaswow.com" id="btnClaim" target="_blank" rel="noopener noreferrer">
      🎁 &nbsp;Claim Hadiah!!
    </a>
  </div>
</div>

<script>
/* floating particles */
const PC=['#c9a227','#9d4dff','#4fc3e8','#f0d060','#ff79c6'];
for(let i=0;i<16;i++){
  const p=document.createElement('div');p.className='particle';
  const s=Math.random()*4+2;
  p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${PC[i%PC.length]};animation-duration:${Math.random()*14+10}s;animation-delay:-${Math.random()*14}s;opacity:${Math.random()*.4+.15};`;
  document.body.appendChild(p);
}

/* popup sparks */
for(let i=0;i<12;i++){
  const s=document.createElement('div');s.className='spark';
  s.style.cssText=`left:${Math.random()*88+6}%;top:${Math.random()*88+6}%;animation-delay:-${Math.random()*3}s;background:${Math.random()>.5?'#c9a227':'#4fc3e8'};`;
  document.getElementById('popupSparks').appendChild(s);
}

/* PRIZE TABLE */
const PRIZES=[
  {amount:200000,  weight:2},
  {amount:500000,  weight:8 },
  {amount:1000000, weight:5 },
  {amount:2000000, weight:20}, /* peluang terbesar ~47% */
];
function pickPrize(){
  const total=PRIZES.reduce((s,p)=>s+p.weight,0);
  let r=Math.random()*total;
  for(const p of PRIZES){r-=p.weight;if(r<=0)return p.amount;}
  return PRIZES[PRIZES.length-1].amount;
}
function fmtRp(n){return'Rp '+n.toLocaleString('id-ID');}

/* device lock */
function devKey(){
  let id=localStorage.getItem('mb_did');
  if(!id){id='d'+Date.now()+'_'+Math.random().toString(36).substr(2,8);localStorage.setItem('mb_did',id);}
  return'mb_opened_'+id;
}
function hasOpened(){return!!localStorage.getItem(devKey());}
function markOpened(){localStorage.setItem(devKey(),'1');}

function showErr(m){
  const el=document.getElementById('errorMsg');
  el.textContent=m;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3200);
}

/* confetti */
function spawnConfetti(){
  const c=['#c9a227','#9d4dff','#4fc3e8','#ff79c6','#88ff88','#f0d060','#fff'];
  for(let i=0;i<80;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='conf';
      el.style.cssText=`left:${Math.random()*100}vw;background:${c[Math.floor(Math.random()*c.length)]};animation-duration:${Math.random()*2+2.5}s;animation-delay:0s;border-radius:${Math.random()>.5?'50%':'2px'};width:${Math.random()*8+5}px;height:${Math.random()*12+7}px;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),5000);
    },i*18);
  }
}

function triggerBurstAndPopup(prize){
  const light=document.getElementById('lightBurst');
  const rays=document.getElementById('raysBurst');

  /* reset paksa sebelum animasi baru */
  light.classList.remove('explode');
  rays.classList.remove('shoot');
  void light.offsetWidth;
  void rays.offsetWidth;

  rays.classList.add('shoot');
  light.classList.add('explode');

  /* popup muncul 500ms setelah cahaya mulai */
  setTimeout(()=>{
    document.getElementById('prizeAmount').textContent=fmtRp(prize);
    document.getElementById('overlay').classList.add('active');
    spawnConfetti();
  },500);

  setTimeout(()=>light.classList.remove('explode'),1200);
  setTimeout(()=>rays.classList.remove('shoot'),1100);
}

let busy=false;

function handleOpen(){
  if(busy)return;

  const uid=document.getElementById('userId').value.trim();
  if(!uid){showErr('⚠ Masukkan User ID terlebih dahulu!');document.getElementById('userId').focus();return;}
  if(uid.length<4){showErr('⚠ User ID minimal 4 karakter!');return;}
  if(hasOpened()){showErr('⚠ Device ini sudah membuka Mystery Box!');return;}

  busy=true;
  markOpened();
  document.getElementById('btnOpen').disabled=true;

  const box=document.getElementById('boxImg');
  const prize=pickPrize(); /* tentukan hadiah di awal */

  /* Step 1: hentikan float, mulai shake */
  box.style.animation='none';
  void box.offsetWidth;
  box.classList.add('shaking');

  /* Step 2: setelah 900ms (durasi shake), jalankan cahaya + popup */
  setTimeout(()=>{
    box.classList.remove('shaking');
    box.style.animation='none';
    triggerBurstAndPopup(prize);
  },920);
}

/* Claim Hadiah */
document.getElementById('btnClaim').addEventListener('click',function(){
  setTimeout(()=>{
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('btnOpen').style.display='none';
    document.getElementById('alreadyMsg').style.display='block';
  },150);
});

/* tutup popup klik di luar */
document.getElementById('overlay').addEventListener('click',function(e){
  if(e.target===this){
    this.classList.remove('active');
    document.getElementById('btnOpen').style.display='none';
    document.getElementById('alreadyMsg').style.display='block';
  }
});

/* cek saat load */
if(hasOpened()){
  document.getElementById('btnOpen').disabled=true;
  document.getElementById('alreadyMsg').style.display='block';
}
</script>
